<style>
:root {
  --bg: #f7f7f8;
  --card: #ffffff;
  --border: #e3e3e6;
  --text: #1a1a1c;
  --muted: #6c6c75;
  --accent: #2563eb;
  --queued: #b45309;
  --queued-bg: #fef3c7;
  --done: #15803d;
  --done-bg: #dcfce7;
  --needs: #b91c1c;
  --needs-bg: #fee2e2;
  --progress: #1d4ed8;
  --progress-bg: #dbeafe;
  --idle: #475569;
  --idle-bg: #f1f5f9;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.4;
}
.topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar h1 { margin: 0; font-size: 18px; font-weight: 600; }
.topbar .logo { flex: 0 0 auto; display: block; }
.topbar .spacer { flex: 1; }
.topbar .meta { color: var(--muted); font-size: 12px; }
button {
  font: inherit;
  border: 1px solid var(--border);
  background: white;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text);
}
button:hover { background: #f3f3f5; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
button.primary { background: var(--accent); color: white; border-color: var(--accent); }
button.primary:hover { background: #1d4fd8; }
main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
section { margin-bottom: 28px; }
section h2 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin: 0 0 10px 0;
  font-weight: 600;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card .top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card .name { font-weight: 600; font-size: 15px; word-break: break-word; flex: 1 1 auto; }
.card .meta { color: var(--muted); font-size: 12px; }
.card .next-step { font-style: italic; }
.checkbox-row { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.checkbox-row input { margin: 0; }
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.pill-queued   { background: var(--queued-bg);   color: var(--queued); }
.pill-done     { background: var(--done-bg);     color: var(--done); }
.pill-needs    { background: var(--needs-bg);    color: var(--needs); }
.pill-progress { background: var(--progress-bg); color: var(--progress); }
.pill-idle     { background: var(--idle-bg);     color: var(--idle); }
.pill-processing { background: #dbeafe; color: #1f6feb; animation: pill-pulse 1.4s ease-in-out infinite; }
@keyframes pill-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
.card .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
.card .actions button,
.card .actions a.btn {
  font-size: 12px;
  padding: 4px 10px;
}
.card .actions .future-btn,
.card .actions .archive-btn,
.card .actions .rename-btn {
  color: var(--muted);
  border-color: transparent;
  background: transparent;
}
.card .actions .future-btn:hover,
.card .actions .archive-btn:hover,
.card .actions .rename-btn:hover {
  background: #f3f3f5;
  border-color: var(--border);
  color: var(--text);
}
/* First of the right-aligned pair pushes both to the right edge. */
.card .actions .future-btn { margin-left: auto; }
.card.archived { opacity: 0.78; }
.card.future { opacity: 0.78; }
section details summary {
  cursor: pointer;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin: 0 0 10px 0;
  font-weight: 600;
  list-style: none;
  display: inline-block;
  user-select: none;
}
section details summary::-webkit-details-marker { display: none; }
section details summary::before {
  content: "▸ ";
  display: inline-block;
  width: 1em;
  transition: transform 0.1s ease;
}
section details[open] summary::before { content: "▾ "; }
section details > .grid { margin-top: 4px; }
a.btn {
  display: inline-block;
  border: 1px solid var(--border);
  background: white;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
}
a.btn:hover { background: #f3f3f5; }
.empty {
  color: var(--muted);
  font-style: italic;
  padding: 8px 0;
}
/* modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
  padding: 20px;
}
.modal {
  background: white;
  border-radius: 10px;
  max-width: 720px;
  width: 100%;
  max-height: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
.modal .modal-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.modal .modal-header h2 { margin: 0; font-size: 16px; font-weight: 600; }
.modal .modal-body { padding: 16px 18px; overflow: auto; flex: 1; }
.modal .modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}
.modal pre {
  background: #f7f7f8;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-wrap: break-word;
  margin: 0;
}
label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
input[type="text"], textarea {
  width: 100%;
  font: inherit;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
}
input[type="text"]:focus, textarea:focus {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  border-color: var(--accent);
}
textarea {
  min-height: 180px;
  resize: vertical;
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 13px;
}
.field { margin-bottom: 14px; }
.error { color: var(--needs); font-size: 13px; margin-top: 8px; min-height: 1em; }
/* ----- project-health status light ----- */
.top { display: flex; align-items: center; gap: 6px; }
.dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%;
       flex: 0 0 auto; box-shadow: 0 0 0 1px rgba(0,0,0,0.12) inset; }
.dot-active   { background: #2ea043; }
.dot-move     { background: #d4a017; }
.dot-slipping { background: #e8590c; }
.dot-stalled  { background: #d1242f; }
.dot-queued, .dot-working { background: #1f6feb; }
.dot-draft, .dot-archived { background: #b0b4ba; }
.health { font-size: 12px; color: #6a737d; margin-top: 3px; }
.health-stalled { color: #d1242f; font-weight: 600; }
.health-slipping { color: #e8590c; font-weight: 600; }
.health-move { color: #b8860b; }
.legend { font-size: 12px; color: #6a737d; font-weight: 400; margin-left: 8px; }
.legend .dot { width: 9px; height: 9px; margin: 0 3px 0 10px; }
.sort-btn { font-size: 11px; text-transform: none; letter-spacing: 0; font-weight: 400; padding: 2px 8px; margin-left: 12px; color: var(--muted); vertical-align: middle; }
.attn-toggle { font-size: 12px; text-transform: none; letter-spacing: 0; font-weight: 400; margin-left: 12px; color: var(--muted); vertical-align: middle; cursor: pointer; user-select: none; }
.attn-toggle input { vertical-align: middle; margin-right: 4px; cursor: pointer; }
</style>
</head>

<main>
  <section>
    <h2>Queued — runs next hour</h2>
    <div class="grid" id="queued"></div>
  </section>
  <section>
    <h2>In your court — needs you
      <span class="legend"><span class="dot dot-stalled"></span>stalled<span class="dot dot-slipping"></span>slipping<span class="dot dot-move"></span>your move<span class="dot dot-active"></span>active</span>
      <label class="attn-toggle" title="Show only projects that are slipping or stalled"><input type="checkbox" id="needs-attn-toggle"> Needs attention</label>
    </h2>
    <div class="grid" id="idle"></div>

  <section>
    <h2>Under assembly</h2>
    <div class="grid" id="assembling"></div>
  </section>

    <details>
      <summary>Future — parked, not processed</summary>
      <div class="grid" id="future"></div>

  </section>
  <section>

      <summary>Archived</summary>
      <div class="grid" id="archived"></div>
    </details>
  </section>

<div id="modal-root"></div>

<script>
const $ = (sel, root=document) => root.querySelector(sel);

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    e.append(c.nodeType ? c : document.createTextNode(c));
  }
  return e;
}

function pill(state, status, p) {
  if (p && p.processing) return el('span', {class: 'pill pill-processing', title: 'A worker is processing this project right now'}, '⚙ processing');
  if (state === 'queued') return el('span', {class: 'pill pill-queued'}, 'queued');
  if (state === 're-engaging') return el('span', {class: 'pill pill-queued'}, (p && p.pending_is_debrief) ? 'queued — debrief' : 'queued — new round');
  if (state === 'idle') {
    if (status === 'done') return el('span', {class: 'pill pill-done', title: 'Processed — ready for your next input (drop another round anytime)'}, 'awaiting input');
    if (status === 'needs-input') return el('span', {class: 'pill pill-needs'}, 'needs-input');
    if (status === 'in-progress') return el('span', {class: 'pill pill-progress'}, 'in-progress');
    return el('span', {class: 'pill pill-idle'}, status || 'idle');
  }
  if (state === 'assembling') return el('span', {class: 'pill pill-idle'}, 'assembling');
  return el('span', {class: 'pill pill-idle'}, state);
}

function formatTimestamp(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString();
  } catch { return iso; }
}

const LIGHT_LABEL = {active: 'active', move: 'your move', slipping: 'slipping',
  stalled: 'stalled', queued: 'in queue', working: 'working',
  draft: 'draft', archived: 'archived'};
const MOMENTUM_GLYPH = {active: '🔥', ticking: '🌤', dormant: '💤'};

function healthText(p) {
  const h = p.health || {};
  let s = LIGHT_LABEL[h.light] || h.light || '';
  if (h.court === 'you' && h.stale_days != null) {
    s += ' · ' + h.stale_days + 'd in your court';
  }
  if (h.momentum) s += ' · ' + (MOMENTUM_GLYPH[h.momentum] || '') + ' ' + h.momentum;
  return s;
}

function projectCard(p) {
  const folder = encodeURIComponent(p.display_name);
  const h = p.health || {};
  const card = el('div', {class: 'card' + (p.is_archived ? ' archived' : '') + (p.is_future ? ' future' : '')},
    el('div', {class: 'top'},
      el('span', {class: 'dot dot-' + (h.light || 'draft'), title: healthText(p)}),
      el('span', {class: 'name'}, p.display_name),
      pill(p.state, p.status, p)
    )
  );

  const ht = healthText(p);
  if (ht) card.append(el('div', {class: 'health health-' + (h.light || '')}, ht));

  if (p.next_step) card.append(el('div', {class: 'meta next-step'}, 'Next: ' + p.next_step));

  const metaBits = [];
  if (p.last_processed) metaBits.push('Last processed: ' + formatTimestamp(p.last_processed));
  if (p.rounds_seen > 0) metaBits.push(p.rounds_seen + ' round' + (p.rounds_seen > 1 ? 's' : ''));
  if (p.actions_count > 0) metaBits.push(p.actions_count + ' action' + (p.actions_count > 1 ? 's' : ''));
  if (p.has_policy) metaBits.push('POLICY.md');
  if (metaBits.length) card.append(el('div', {class: 'meta'}, metaBits.join(' · ')));

  const actions = el('div', {class: 'actions'});

  if (p.has_summary) {
    actions.append(el('button', {onclick: () => openSummary(p)}, 'View summary'));
  }
  if (p.has_results) {
    actions.append(el('a', {class: 'btn', href: `/api/projects/${folder}/results`, target: '_blank', rel: 'noopener'}, 'Open results'));
  }
  if (p.has_actions) {
    actions.append(el('button', {onclick: () => openActions(p)}, 'View actions'));
  }
  if (p.has_lessons) {
    actions.append(el('button', {onclick: () => openLessons(p)}, 'View lessons'));
  }

  if (p.is_archived) {
    actions.append(el('button', {class: 'primary', onclick: (ev) => unarchiveProject(p, ev.currentTarget)}, 'Unarchive'));
  } else if (p.is_future) {
    actions.append(el('button', {class: 'primary', title: 'Move back to the Tasks root', onclick: (ev) => unfutureProject(p, ev.currentTarget)}, 'Bring back'));
  } else {
    if (p.has_instructions) {
      actions.append(el('button', {onclick: () => openEditInstructions(p)}, 'Edit instructions'));
    }
    if (p.state === 'idle') {
      actions.append(el('button', {class: 'primary', onclick: () => openNewRound(p)}, '+ New round'));
    }
    if (p.state === 'idle' && p.has_summary) {
      actions.append(el('button', {onclick: () => openRecordAction(p)}, 'Record action'));
    }
    const fileInput = el('input', {type: 'file', style: 'display:none',
      onchange: (ev) => { const f = ev.target.files[0]; if (f) uploadFile(p, f); ev.target.value = ''; }});
    actions.append(fileInput);
    actions.append(el('button', {title: 'Copy a file into this project folder', onclick: () => fileInput.click()}, 'Upload file'));
    actions.append(el('button', {class: 'future-btn', title: 'Park in Future/ (not processed until brought back)', onclick: (ev) => futureProject(p, ev.currentTarget)}, 'Move to Future'));
    actions.append(el('button', {class: 'archive-btn', title: 'Move to Archive/', onclick: (ev) => archiveProject(p, ev.currentTarget)}, 'Archive'));
  }

  actions.append(el('button', {class: 'rename-btn', title: 'Rename this project folder', onclick: () => openRename(p)}, 'Rename'));

  if (actions.childNodes.length) card.append(actions);
  return card;
}

let projects = [];

// ---- "In your court" sort modes ----
// Staleness (days the ball has sat with you) is the base signal; null sinks last.
const _stale = (p) => (p.health && p.health.stale_days != null) ? p.health.stale_days : -1;
const _byName = (a, b) => a.display_name.localeCompare(b.display_name);

// "In your court" has a single fixed order: newest / just-drained first
// (ascending staleness — 0 days idle = just processed → top), tiebreak by name.
const idleCmp = (a, b) => (_stale(a) - _stale(b)) || _byName(a, b);
// "Needs attention" filter: show only projects whose light is slipping/stalled.
const _needsAttn = (p) => !!(p.health && (p.health.light === 'slipping' || p.health.light === 'stalled'));
let needsAttention = localStorage.getItem('needsAttention') === '1';

async function fetchProjects() {
  try {
    const res = await fetch('/api/projects');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    projects = await res.json();
    render();
    const processing = projects.filter(p => p.processing).length;
    const queued = projects.filter(p => (p.state === 'queued' || p.state === 're-engaging') && !p.processing).length;
    let stamp = 'Last refreshed ' + new Date().toLocaleTimeString();
    if (processing > 0) stamp = `⚙ ${processing} processing · ${queued} queued — ` + stamp;
    $('#last-fetched').textContent = stamp;
  } catch (e) {
    $('#last-fetched').textContent = 'Refresh failed: ' + e.message;
  }
}

function render() {
  const buckets = { queued: [], idle: [], assembling: [], future: [], archived: [] };
  for (const p of projects) {
    if (p.is_archived) buckets.archived.push(p);
    else if (p.is_future) buckets.future.push(p);
    else if (p.state === 'queued' || p.state === 're-engaging') buckets.queued.push(p);
    else if (p.state === 'idle') buckets.idle.push(p);
    else buckets.assembling.push(p);
  }
  // "In your court": single order (newest/just-drained first); optional
  // "Needs attention" filter keeps only slipping/stalled.
  buckets.idle.sort(idleCmp);
  if (needsAttention) buckets.idle = buckets.idle.filter(_needsAttn);
  buckets.queued.sort((a, b) => a.display_name.localeCompare(b.display_name));
  buckets.assembling.sort((a, b) => a.display_name.localeCompare(b.display_name));
  buckets.future.sort((a, b) => a.display_name.localeCompare(b.display_name));
  // Archived: most-recently-archived first.
  buckets.archived.sort((a, b) => (b.archived_at || 0) - (a.archived_at || 0));

  const emptyMessages = {
    queued: 'Nothing queued.',
    idle: 'No processed projects yet.',
    assembling: 'No folders under assembly.',
    future: 'No parked projects.',
    archived: 'No archived projects.',
  };

  for (const [key, list] of Object.entries(buckets)) {
    const root = $('#' + key);
    root.innerHTML = '';
    if (list.length === 0) {
      root.append(el('div', {class: 'empty'}, emptyMessages[key]));
    } else {
      for (const p of list) root.append(projectCard(p));
    }
  }
}

function showModal(buildContent) {
  const root = $('#modal-root');
  root.innerHTML = '';
  const backdrop = el('div', {
    class: 'modal-backdrop',
    onclick: (e) => { if (e.target === backdrop) closeModal(); },
  });
  const modal = el('div', {class: 'modal'});
  backdrop.append(modal);
  root.append(backdrop);
  buildContent(modal);
}
function closeModal() { $('#modal-root').innerHTML = ''; }
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

async function openEditInstructions(p) {

  submit.disabled = true;
  submit.addEventListener('click', async () => {
    const text = textarea.value.trim();
    if (!text) { errorBox.textContent = 'Instructions cannot be empty.'; return; }
    errorBox.textContent = '';
    submit.disabled = true;
    try {
      const res = await fetch(`/api/projects/${encodeURIComponent(p.display_name)}/instructions`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({instructions: text}),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({error: res.statusText}));
        errorBox.textContent = j.error || 'Failed';
        submit.disabled = false;
        return;
      }
      closeModal();
      await fetchProjects();
    } catch (e) {
      errorBox.textContent = e.message;
      submit.disabled = false;
    }

  showModal((modal) => {
    modal.append(
      el('div', {class: 'modal-header'}, el('h2', {}, 'Edit pending instructions — ' + p.display_name)),
      el('div', {class: 'modal-body'},
        el('div', {class: 'field'},
          el('label', {}, 'Instructions (saved as instructions.md)'),
          textarea
        ),
        errorBox
      ),
      el('div', {class: 'modal-footer'},
        el('button', {onclick: closeModal}, 'Cancel'),
        submit
      )
    );
  });

  try {
    const res = await fetch(`/api/projects/${encodeURIComponent(p.display_name)}/instructions`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    textarea.value = await res.text();
    textarea.placeholder = '';
    textarea.disabled = false;
    submit.disabled = false;
    textarea.focus();
  } catch (e) {
    errorBox.textContent = 'Failed to load current instructions: ' + e.message;
    textarea.placeholder = '';
    textarea.disabled = false;
  }
}

// Upload one file's bytes into a project folder (by display name). Returns the
// server's {filename, bytes} on success; throws on failure. Shared by the
// per-project "Upload file" button and the new-project modal's attachments.
async function uploadFileTo(displayName, file) {
  const buf = await file.arrayBuffer();
  const res = await fetch(`/api/projects/${encodeURIComponent(displayName)}/files?name=${encodeURIComponent(file.name)}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/octet-stream'},
    body: buf,
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(j.error || ('HTTP ' + res.status));
  return j;
}

async function uploadFile(p, file) {
  try {
    const j = await uploadFileTo(p.display_name, file);
    const kb = (j.bytes / 1024).toFixed(1);
    $('#last-fetched').textContent = `Uploaded “${j.filename}” (${kb} KB) → ${p.display_name}`;
    fetchProjects();
  } catch (e) {
    $('#last-fetched').textContent = 'Upload failed: ' + e.message;
  }
}

function openNewProject() {
  showModal((modal) => {
    const errorBox = el('div', {class: 'error'});
    const nameInput = el('input', {type: 'text', placeholder: 'leave blank to let the agent title it'});
    const textarea = el('textarea', {placeholder: 'What do you want done?'});
    const filesInput = el('input', {type: 'file', multiple: true});
    const submit = el('button', {class: 'primary', onclick: async () => {
      const name = nameInput.value.trim();
      const text = textarea.value.trim();
      if (!text) { errorBox.textContent = 'Instructions cannot be empty.'; return; }
      errorBox.textContent = '';
      submit.disabled = true;
      submit.textContent = name ? 'Creating…' : 'Naming…';
      try {
        // Defer the auto-run to the client: create the folder first, upload any
        // attachments, THEN start processing — so the worker doesn't begin before
        // the files have landed.
        const res = await fetch('/api/projects', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, instructions: text, autorun: false}),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({error: res.statusText}));
          errorBox.textContent = j.error || 'Failed';
          submit.disabled = false;
          submit.textContent = 'Create project';
          return;
        }
        const created = await res.json().catch(() => null);
        const files = filesInput.files;
        if (created && files && files.length) {
          submit.textContent = 'Uploading…';
          const failed = [];
          for (const f of files) {
            try { await uploadFileTo(created.display_name, f); }
            catch (e) { failed.push(f.name); }
          }
          $('#last-fetched').textContent = failed.length
            ? `Project created, but ${failed.length} file(s) failed: ${failed.join(', ')} — use “Upload file” on the card to retry.`
            : `Created “${created.display_name}” with ${files.length} file(s).`;
        }
        // Start processing now (honors .pause; no-op if a run is already going).
        try { await fetch('/api/run', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({respect_pause: true})}); } catch (e) {}
        closeModal();
        await fetchProjects();
      } catch (e) {
        errorBox.textContent = e.message;
        submit.disabled = false;
        submit.textContent = 'Create project';
      }
    }}, 'Create project');
    modal.append(
      el('div', {class: 'modal-header'}, el('h2', {}, 'New project')),
      el('div', {class: 'modal-body'},
        el('div', {class: 'field'}, el('label', {}, 'Folder name (optional — the agent will name it)'), nameInput),
        el('div', {class: 'field'}, el('label', {}, 'Instructions (instructions.md content)'), textarea),
        el('div', {class: 'field'}, el('label', {}, 'Attach files (optional)'), filesInput),
        errorBox
      ),
      el('div', {class: 'modal-footer'},
        el('button', {onclick: closeModal}, 'Cancel'),
        submit
      )
    );
    setTimeout(() => textarea.focus(), 30);
  });
}

let runPollTimer = null;
function trackRun() {
  const btn = $('#run-queue-btn');
  if (runPollTimer) return;
  btn.disabled = true; btn.textContent = 'Running…';
  runPollTimer = setInterval(async () => {
    let running = false;
    try { running = (await (await fetch('/api/run')).json()).running; }
    catch (e) { return; }  // transient — keep polling
    fetchProjects();  // refresh cards each tick so 'processing' badges update live
    if (running) return;
    clearInterval(runPollTimer); runPollTimer = null;
    btn.disabled = false; btn.textContent = 'Run now';
    fetchProjects();
  }, 5000);
}
async function runQueue() {
  const btn = $('#run-queue-btn');
  if (runPollTimer) return;  // a run is already being tracked
  if (!confirm('Run the queue now?\n\nThis processes every pending project in the background (minutes each). The agent may take real actions — send email, post to Slack — per each project\'s policy.')) return;
  btn.disabled = true; btn.textContent = 'Starting…';
  try {
    const res = await fetch('/api/run', {method: 'POST'});
    const j = await res.json().catch(() => ({}));
    if (!res.ok) {
      alert(j.error || 'Failed to start');
      btn.disabled = false; btn.textContent = 'Run now';
      return;
    }
    trackRun();
  } catch (e) {
    alert(e.message);
    btn.disabled = false; btn.textContent = 'Run now';
  }
}
